<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="Sentinel — notice what doesn't belong">
  <defs>
    <pattern id="field" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1.5" fill="#ffffff" opacity="0.12"/>
    </pattern>
    <radialGradient id="amber" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fcd34d" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fcd34d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="teal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="32%" cy="46%" r="85%">
      <stop offset="0%" stop-color="#040506" stop-opacity="0"/>
      <stop offset="100%" stop-color="#040506" stop-opacity="0.88"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="400" fill="#040506"/>
  <circle cx="300" cy="120" r="260" fill="url(#teal)"/>
  <rect width="1200" height="400" fill="url(#field)"/>

  <circle cx="985" cy="150" r="130" fill="url(#amber)"/>
  <circle cx="985" cy="150" r="28" fill="none" stroke="#fcd34d" stroke-opacity="0.45" stroke-width="1.5"/>
  <circle cx="985" cy="150" r="7.5" fill="#fcd34d"/>

  <rect width="1200" height="400" fill="url(#vignette)"/>

  <text x="74" y="148" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" letter-spacing="4" fill="#fcd34d" fill-opacity="0.9">ON-DEVICE · OFFLINE · NO QUERY BOX</text>
  <text x="70" y="252" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="106" font-weight="300" letter-spacing="-3" fill="#ffffff">Sentinel</text>
  <text x="74" y="306" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="26" font-weight="300" fill="#ffffff" fill-opacity="0.64">Notice what doesn’t belong — real-time anomaly detection with embedded Qdrant.</text>
  <text x="74" y="346" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13.5" letter-spacing="2" fill="#fcd34d" fill-opacity="0.7">⚠ it flags the out-of-place thing you never told it to look for</text>
</svg>
